/* ── Firestore 저장/로드 ── */
function getUserDoc(userId, key) {
  return db.collection("users").doc(userId).collection("data").doc(key);
}
 
async function loadData(userId, key, fallback) {
  try {
    const doc = await getUserDoc(userId, key).get();
    if (doc.exists) return doc.data().value;
    return fallback;
  } catch (e) { return fallback; }
}
 
async function saveData(userId, key, val) {
  try {
    await getUserDoc(userId, key).set({ value: val, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  } catch (e) { /* silent */ }
}

const fmtDate = (d) => { const o = new Date(d); return (o.getMonth() + 1) + "." + String(o.getDate()).padStart(2, "0"); };
 
const toMin = (t) => {
  const parts = t.split(":");
  const h = parseInt(parts[0]);
  const m = parseInt(parts[1]);
  const adj = h < 6 ? h + 24 : h;
  return (adj - 6) * 60 + m;
};

const getMonday = (d) => {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return date.toISOString().slice(0, 10);
};
 
const getCurrentWeekKey = () => getMonday(new Date());
const shiftWeek = (weekKey, delta) => { const d = new Date(weekKey); d.setDate(d.getDate() + delta * 7); return d.toISOString().slice(0, 10); };
 
const getWeekDates = (weekKey) => {
  const dates = [];
  for (let i = 0; i < 7; i++) { const d = new Date(weekKey); d.setDate(d.getDate() + i); dates.push({ month: d.getMonth() + 1, day: d.getDate(), full: d.toISOString().slice(0, 10) }); }
  return dates;
};

/* ════════════ AUTH WRAPPER ════════════ */
function AuthWrapper() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [configError, setConfigError] = useState(false);
 
  useEffect(() => {
    if (firebaseConfig.apiKey === "여기에-API-KEY-입력") {
      setConfigError(true); setLoading(false); return;
    }
    const unsub = auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
    return () => unsub();
  }, []);
 
  const signIn = async () => {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    } catch (e) { alert("로그인 실패: " + e.message); }
  };
 
  const signOut = async () => { await auth.signOut(); };
 
  if (loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#fafaf8",color:"#ccc",fontSize:12}}>불러오는 중...</div>;

    <div style={{maxWidth:420,margin:"60px auto",padding:"0 20px",fontFamily:"-apple-system,sans-serif"}}>

          <strong>설정 방법:</strong><br/>
          1. <a href="https://console.firebase.google.com" target="_blank" style={{color:"#1565c0"}}>Firebase Console</a> 에서 새 프로젝트 생성<br/>
          2. Authentication → Google 로그인 활성화<br/>
          3. Firestore Database → 데이터베이스 만들기 (테스트 모드)<br/>
          4. 프로젝트 설정(⚙) → 내 앱 → 웹 앱 추가<br/>
          5. 발급받은 <code style={{background:"#f0f0f0",padding:"1px 4px",borderRadius:3}}>firebaseConfig</code> 값을 이 HTML 파일 상단의 해당 부분에 붙여넣기<br/><br/>
          <strong>Firestore 보안 규칙 (선택):</strong><br/>
          테스트 모드 이후 아래 규칙으로 변경하면 본인 데이터만 접근 가능합니다:
        </div>
        <pre style={{background:"#f5f5f3",borderRadius:8,padding:12,fontSize:10,marginTop:10,overflow:"auto",lineHeight:1.6,color:"#444"}}>{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /users/{userId}/{document=**} {
      allow read, write: if request.auth != null
                         && request.auth.uid == userId;
    }
  }
}`}</pre>
      </div>
    </div>
  );
 
  if (!user) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#fafaf8",gap:20}}>

      <div style={{fontSize:11,color:"#aaa"}}>로그인하면 어느 기기에서든 동기화됩니다</div>
      <button onClick={signIn} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 28px",background:"#fff",border:"1px solid #ddd",borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",transition:"all 0.15s"}}>

/* ════════════ MAIN APP ════════════ */
function MainApp({ user, signOut }) {
  const [tab, setTab] = useState("timetable");
  const [todos, setTodos] = useState([]);
  const [timetable, setTimetable] = useState(DEFAULT_TT);
  const [weekKey, setWeekKey] = useState(getCurrentWeekKey);
  const [weekNotes, setWeekNotes] = useState({});
  const [weekBlocks, setWeekBlocks] = useState(EMPTY_BLOCKS);
  const [loaded, setLoaded] = useState(false);
  const [weekLoaded, setWeekLoaded] = useState(false);
 
  const userId = user.uid;
 
  // Debounced save
  const saveTimer = useRef({});
  const debouncedSave = useCallback((key, val) => {
    if (saveTimer.current[key]) clearTimeout(saveTimer.current[key]);
    saveTimer.current[key] = setTimeout(() => saveData(userId, key, val), 500);
  }, [userId]);
 
  // Load global data
  useEffect(() => {
    Promise.all([
      loadData(userId, "todos", []),
      loadData(userId, "timetable", null),
    ]).then(([t, tt]) => {
      setTodos(t);
      if (tt) setTimetable(tt);
      setLoaded(true);
    });
  }, [userId]);
 
  // Load week data
  useEffect(() => {
    setWeekLoaded(false);
    Promise.all([
      loadData(userId, "notes-" + weekKey, {}),
      loadData(userId, "blocks-" + weekKey, EMPTY_BLOCKS),
    ]).then(([n, b]) => { setWeekNotes(n); setWeekBlocks(b); setWeekLoaded(true); });
  }, [weekKey, userId]);
 
  // Save effects
  useEffect(() => { if (loaded) debouncedSave("todos", todos); }, [todos, loaded]);
  useEffect(() => { if (loaded) debouncedSave("timetable", timetable); }, [timetable, loaded]);
  useEffect(() => { if (weekLoaded) debouncedSave("notes-" + weekKey, weekNotes); }, [weekNotes, weekLoaded, weekKey]);
  useEffect(() => { if (weekLoaded) debouncedSave("blocks-" + weekKey, weekBlocks); }, [weekBlocks, weekLoaded, weekKey]);
 
  if (!loaded || !weekLoaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#fafaf8",color:"#ccc",fontSize:12}}>불러오는 중...</div>;
 
  const isCurrentWeek = weekKey === getCurrentWeekKey();
 
  return (
    <div style={{maxWidth:tab==="overview"?1200:480,margin:"0 auto",minHeight:"100vh",background:"#fafaf8",display:"flex",flexDirection:"column",position:"relative",transition:"max-width 0.3s"}}>
      <div style={{flex:1,overflow:"auto",paddingBottom:56}}>
        {tab === "timetable" && <TimetableTab timetable={timetable} setTimetable={setTimetable} notes={weekNotes} setNotes={setWeekNotes} customBlocks={weekBlocks} setCustomBlocks={setWeekBlocks} weekKey={weekKey} setWeekKey={setWeekKey} isCurrentWeek={isCurrentWeek} user={user} signOut={signOut} />}
        {tab === "todo" && <TodoTab todos={todos} setTodos={setTodos} />}
        {tab === "overview" && <OverviewTab timetable={timetable} notes={weekNotes} customBlocks={weekBlocks} weekKey={weekKey} setWeekKey={setWeekKey} isCurrentWeek={isCurrentWeek} todos={todos} setTodos={setTodos} />}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:tab==="overview"?1200:480,background:"rgba(255,255,255,0.96)",backdropFilter:"blur(20px)",borderTop:"1px solid #eee",display:"flex",zIndex:100}}>
        {[{id:"timetable",label:"시간표"},{id:"overview",label:"전체 보기"},{id:"todo",label:"TO DO LIST"}].map((t) => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"14px 0 14px",fontSize:11,color:"#222",fontWeight:tab===t.id?700:400,opacity:tab===t.id?1:0.35,borderTop:tab===t.id?"2px solid #222":"2px solid transparent",transition:"all 0.15s"}}>{t.label}</button>
        ))}
      </div>
    </div>
  );
}
 
/* ════════════ TIMETABLE ════════════ */
function TimetableTab({timetable,setTimetable,notes,setNotes,customBlocks,setCustomBlocks,weekKey,setWeekKey,isCurrentWeek,user,signOut}) {
  const initDay = () => { const d = new Date().getDay(); return d===0?6:d-1; };
  const [selDay,setSelDay] = useState(initDay);
  const scrollRef = useRef(null);
  const isWeekend = selDay >= 5;
  const weekDates = getWeekDates(weekKey);
  const todayStr = getToday();
 
  const [adding,setAdding] = useState(false);
  const [editingBlock,setEditingBlock] = useState(null);
  const [form,setForm] = useState({title:"",start:"18:00",end:"21:00",color:"#888"});
  const [editingClass,setEditingClass] = useState(null);
  const [classForm,setClassForm] = useState({name:"",teacher:"",room:"",subj:"etc",color:""});
  const [showSettings,setShowSettings] = useState(false);
 
  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=toMin("08:00")*PX;},[selDay,weekKey]);
 
  const goWeek=(delta)=>{setWeekKey(shiftWeek(weekKey,delta));setAdding(false);setEditingBlock(null);setEditingClass(null);};
 
  const saveBlock=()=>{if(!form.title.trim())return;if(editingBlock){setCustomBlocks(p=>({...p,[selDay]:(p[selDay]||[]).map(b=>b.id===editingBlock?{...b,title:form.title.trim(),start:form.start,end:form.end,color:form.color}:b)}));setEditingBlock(null);}else{setCustomBlocks(p=>({...p,[selDay]:[...(p[selDay]||[]),{id:uid(),title:form.title.trim(),start:form.start,end:form.end,color:form.color}]}));}setForm({title:"",start:"18:00",end:"21:00",color:"#888"});setAdding(false);};
  const startEditBlock=(b)=>{setForm({title:b.title,start:b.start,end:b.end,color:b.color||"#888"});setEditingBlock(b.id);setAdding(true);setEditingClass(null);};
  const removeBlock=(id)=>{setCustomBlocks(p=>({...p,[selDay]:(p[selDay]||[]).filter(b=>b.id!==id)}));if(editingBlock===id){setAdding(false);setEditingBlock(null);}};
  const cancelBlockForm=()=>{setAdding(false);setEditingBlock(null);setForm({title:"",start:"18:00",end:"21:00",color:"#888"});};
 
  const startEditClass=(pi)=>{const cls=timetable[selDay]&&timetable[selDay][pi];if(cls){setClassForm({name:cls[0],teacher:cls[1],room:cls[2],subj:cls[3],color:cls[4]||""});}else{setClassForm({name:"",teacher:"",room:"",subj:"etc",color:""});}setEditingClass(pi);setAdding(false);setEditingBlock(null);};
  const saveClass=()=>{if(!classForm.name.trim())return;setTimetable(p=>{const u={...p};const a=[...(u[selDay]||Array(8).fill(null))];a[editingClass]=[classForm.name.trim(),classForm.teacher.trim(),classForm.room.trim(),classForm.subj,classForm.color||""];u[selDay]=a;return u;});setEditingClass(null);};
  const deleteClass=(pi)=>{setTimetable(p=>{const u={...p};const a=[...(u[selDay]||Array(8).fill(null))];a[pi]=null;u[selDay]=a;return u;});if(editingClass===pi)setEditingClass(null);};
  const cancelClassForm=()=>{setEditingClass(null);};
  const resetTimetable=()=>{setTimetable(JSON.parse(JSON.stringify(DEFAULT_TT)));setShowSettings(false);};
  const updateNote=(key,value)=>setNotes(p=>({...p,[key]:value}));
 
  const buildBlocks=()=>{
    if(isWeekend)return[];const classes=timetable[selDay]||[];const result=[];
    result.push({type:"free",start:"06:00",end:"09:00",label:"아침"});
    for(let i=0;i<8;i++){const period=PERIODS[i];if(!period)continue;const cls=classes[i];
    if(cls){result.push({type:"class",start:period.start,end:period.end,period:period.p,periodIdx:i,name:cls[0],teacher:cls[1],room:cls[2],subj:cls[3],customColor:cls[4]||""});}

              if(b.type==="lunch"){const nk=selDay+"-lunch";return(<div key={"s"+i} style={{position:"absolute",top,left:0,right:0,height,background:"#f8f7f4",borderLeft:"3px solid #ddd",borderRadius:6,padding:"5px 7px",display:"flex",flexDirection:"column"}}><div style={{display:"flex",justifyContent:"space-between",flexShrink:0}}><span style={{fontSize:10,fontWeight:600,color:"#aaa"}}>점심</span><span style={{fontSize:7,color:"#ddd",fontFamily:"monospace"}}>12:50-14:00</span></div><textarea value={notes[nk]||""} onChange={(e)=>updateNote(nk,e.target.value)} placeholder="메모..." style={{flex:1,marginTop:3,background:"rgba(255,255,255,0.35)",border:"none",borderRadius:4,padding:"2px 5px",fontSize:9,color:"#888",outline:"none",resize:"none",lineHeight:1.4,minHeight:0}} /></div>);}
              if(b.type==="gap"&&height>8){return<div key={"s"+i} style={{position:"absolute",top,left:0,right:0,height,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:2,height:2,borderRadius:"50%",background:"#ddd"}} /></div>;}
              if(b.type==="free"){const nk=selDay+"-f-"+b.label;return(<div key={"s"+i} style={{position:"absolute",top,left:0,right:0,height,borderRadius:6,padding:"5px 7px",display:"flex",flexDirection:"column"}}><div style={{display:"flex",justifyContent:"space-between",flexShrink:0}}><span style={{fontSize:9,fontWeight:600,color:"#d0d0cc"}}>{b.label}</span><span style={{fontSize:7,color:"#ddd",fontFamily:"monospace"}}>{b.start}-{b.end}</span></div><textarea value={notes[nk]||""} onChange={(e)=>updateNote(nk,e.target.value)} placeholder="자유 시간..." style={{flex:1,marginTop:3,background:"transparent",border:"1px dashed #e8e6e2",borderRadius:4,padding:"2px 5px",fontSize:9,color:"#999",outline:"none",resize:"none",lineHeight:1.4,minHeight:0}} /></div>);}
              return null;})}
 
            {userBlocks.map((b)=>{const top=toMin(b.start)*PX;const height=Math.max((toMin(b.end)-toMin(b.start))*PX,30);const nk="u-"+selDay+"-"+b.id;const bc=b.color||"#888";
              return(<div key={b.id} style={{position:"absolute",top,left:0,right:0,height,background:"#fff",borderLeft:"3px solid "+bc,borderRadius:6,padding:"5px 7px",display:"flex",flexDirection:"column",zIndex:2,boxShadow:"0 1px 3px rgba(0,0,0,0.03)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexShrink:0}}>
                  <span style={{fontSize:11,fontWeight:700,color:bc,cursor:"pointer"}} onClick={()=>startEditBlock(b)}>{b.title}</span>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}><span style={{fontSize:7,color:"#aaa",fontFamily:"monospace"}}>{b.start}-{b.end}</span><button onClick={()=>startEditBlock(b)} style={{background:"none",border:"none",cursor:"pointer",fontSize:9,color:"#aaa",padding:0}}>수정</button><button onClick={()=>removeBlock(b.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#ccc",padding:0,lineHeight:1}}>×</button></div></div>
                <textarea value={notes[nk]||""} onChange={(e)=>updateNote(nk,e.target.value)} placeholder="메모..." style={{flex:1,marginTop:3,background:"rgba(255,255,255,0.45)",border:"none",borderRadius:4,padding:"2px 5px",fontSize:9,color:"#555",outline:"none",resize:"none",lineHeight:1.4,minHeight:0}} />
              </div>);})}
          </div>
        </div>
 
        {!adding&&editingClass===null&&(<div style={{position:"fixed",bottom:66,right:16,zIndex:50}}><button onClick={()=>{cancelBlockForm();cancelClassForm();setAdding(true);}} style={{width:42,height:42,borderRadius:12,background:"#222",color:"#fff",border:"none",fontSize:20,cursor:"pointer",boxShadow:"0 4px 14px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button></div>)}
 
        {adding&&(<div style={{position:"fixed",bottom:58,left:10,right:10,maxWidth:460,margin:"0 auto",background:"#fff",borderRadius:14,padding:14,boxShadow:"0 -4px 20px rgba(0,0,0,0.08)",border:"1px solid #eee",zIndex:60}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>{editingBlock?"블록 수정":"블록 추가"}</div>
          <input value={form.title} onChange={(e)=>setForm(f=>({...f,title:e.target.value}))} placeholder="제목 (예: 학원, 자습...)" autoFocus style={{width:"100%",padding:"7px 9px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:11,outline:"none",marginBottom:6}} />
          <div style={{display:"flex",gap:6,marginBottom:8}}><div style={{flex:1}}><div style={{fontSize:8,fontWeight:600,color:"#aaa",marginBottom:3}}>시작</div><input type="time" value={form.start} onChange={(e)=>setForm(f=>({...f,start:e.target.value}))} style={{width:"100%",padding:"5px 6px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:10,outline:"none"}} /></div><div style={{flex:1}}><div style={{fontSize:8,fontWeight:600,color:"#aaa",marginBottom:3}}>끝</div><input type="time" value={form.end} onChange={(e)=>setForm(f=>({...f,end:e.target.value}))} style={{width:"100%",padding:"5px 6px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:10,outline:"none"}} /></div></div>
          <div style={{marginBottom:8}}><div style={{fontSize:8,fontWeight:600,color:"#aaa",marginBottom:3}}>색상</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{PASTEL_COLORS.map((c)=>(<div key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{width:20,height:20,borderRadius:5,background:c,cursor:"pointer",border:form.color===c?"2px solid #222":"2px solid transparent",outline:form.color===c?"1.5px solid #fff":"none"}} />))}</div></div>
          <div style={{display:"flex",gap:6}}><button onClick={saveBlock} style={{flex:1,padding:8,background:"#222",color:"#fff",border:"none",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>{editingBlock?"저장":"추가"}</button><button onClick={cancelBlockForm} style={{padding:"8px 12px",background:"#f0f0f0",color:"#888",border:"none",borderRadius:8,fontSize:11,cursor:"pointer"}}>취소</button></div>
        </div>)}
 
        {editingClass!==null&&(<div style={{position:"fixed",bottom:58,left:10,right:10,maxWidth:460,margin:"0 auto",background:"#fff",borderRadius:14,padding:14,boxShadow:"0 -4px 20px rgba(0,0,0,0.08)",border:"1px solid #eee",zIndex:60}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>{PERIODS[editingClass]?PERIODS[editingClass].p+"교시 수정":"수업 수정"}</div>
          <input value={classForm.name} onChange={(e)=>setClassForm(f=>({...f,name:e.target.value}))} placeholder="과목명" autoFocus style={{width:"100%",padding:"7px 9px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:11,outline:"none",marginBottom:6}} />
          <div style={{display:"flex",gap:6,marginBottom:6}}><div style={{flex:1}}><div style={{fontSize:8,fontWeight:600,color:"#aaa",marginBottom:3}}>선생님</div><input value={classForm.teacher} onChange={(e)=>setClassForm(f=>({...f,teacher:e.target.value}))} placeholder="선택" style={{width:"100%",padding:"5px 6px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:10,outline:"none"}} /></div><div style={{flex:1}}><div style={{fontSize:8,fontWeight:600,color:"#aaa",marginBottom:3}}>교실</div><input value={classForm.room} onChange={(e)=>setClassForm(f=>({...f,room:e.target.value}))} placeholder="선택" style={{width:"100%",padding:"5px 6px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:10,outline:"none"}} /></div></div>
          <div style={{marginBottom:8}}><div style={{fontSize:8,fontWeight:600,color:"#aaa",marginBottom:3}}>과목 분류</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{SUBJ_LIST.map((s)=>{const sc=SC[s.key]||SC.etc;const sel=classForm.subj===s.key;return(<button key={s.key} onClick={()=>setClassForm(f=>({...f,subj:s.key,color:""}))} style={{padding:"3px 8px",borderRadius:6,fontSize:9,fontWeight:sel?700:400,cursor:"pointer",background:sel?sc.fg:"#f5f5f3",color:sel?"#fff":sc.fg,border:sel?"1.5px solid "+sc.fg:"1.5px solid transparent",transition:"all 0.15s"}}>{s.label}</button>);})}</div></div>

    </div>);
}

function TodoTab({todos,setTodos}) {
  const [showAdd,setShowAdd]=useState(false);const [editId,setEditId]=useState(null);
  const [title,setTitle]=useState("");const [date,setDate]=useState(getToday());
  const [color,setColor]=useState("#90caf9");const [targetMin,setTargetMin]=useState("");
  const [filter,setFilter]=useState("all");
 
  const resetForm=()=>{setTitle("");setDate(getToday());setColor("#90caf9");setTargetMin("");setEditId(null);};
  const openAdd=()=>{resetForm();setShowAdd(true);};
  const openEdit=(t)=>{setTitle(t.title);setDate(t.date);setColor(t.color);setTargetMin(t.tMin?String(t.tMin):"");setEditId(t.id);setShowAdd(true);};
  const saveTodo=()=>{if(!title.trim())return;if(editId){setTodos(p=>p.map(t=>t.id===editId?{...t,title:title.trim(),date,color,tMin:targetMin?Number(targetMin):null}:t));}else{setTodos(p=>[...p,{id:uid(),title:title.trim(),date,color,tMin:targetMin?Number(targetMin):null,done:false}]);}resetForm();setShowAdd(false);};
  const cancelForm=()=>{setShowAdd(false);resetForm();};
  const toggleTodo=(id)=>setTodos(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const removeTodo=(id)=>{setTodos(p=>p.filter(t=>t.id!==id));if(editId===id)cancelForm();};
 
  const filtered=todos.filter((t)=>{
    if(filter==="done")return t.done;if(filter==="today")return t.date===getToday();
    if(filter==="tomorrow")return t.date===getTomorrow();if(filter==="yesterday")return t.date===getYesterday();return true;
  }).sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;if(a.color!==b.color)return(a.color||"").localeCompare(b.color||"");return(a.title||"").localeCompare(b.title||"","ko");});
 
  return(
    <div style={{padding:"16px 12px"}}>
      <div style={{marginBottom:2}}><div style={{fontSize:18,fontWeight:700,letterSpacing:0.5,fontFamily:"monospace"}}>TO DO LIST</div></div>
      <div style={{fontSize:9,color:"#bbb",marginBottom:10}}>{todos.filter(t=>!t.done).length}개 남음</div>
      <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
        {[["all","전체"],["today","오늘"],["tomorrow","내일"],["yesterday","어제"],["done","완료"]].map(([k,l])=>(<button key={k} onClick={()=>setFilter(k)} style={{padding:"4px 11px",borderRadius:14,border:filter===k?"1.5px solid #222":"1.5px solid #e0e0e0",cursor:"pointer",fontSize:10,fontWeight:filter===k?700:400,whiteSpace:"nowrap",background:filter===k?"#222":"#fff",color:filter===k?"#fff":"#999",transition:"all 0.15s"}}>{l}</button>))}
      </div>
 
      {showAdd&&(<div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.03)",padding:14,marginBottom:10,border:"1.5px solid #222",overflow:"hidden"}}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>{editId?"수정":"새 할 일"}</div>
        <input value={title} onChange={(e)=>setTitle(e.target.value)} placeholder="할 일을 입력하세요" autoFocus onKeyDown={(e)=>e.key==="Enter"&&saveTodo()} style={{width:"100%",padding:"8px 9px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:11,outline:"none",marginBottom:6}} />
        <div style={{display:"flex",gap:6,marginBottom:6}}><div style={{flex:1}}><div style={{fontSize:8,fontWeight:600,color:"#aaa",marginBottom:3}}>날짜</div><input type="date" value={date} onChange={(e)=>setDate(e.target.value)} style={{width:"100%",padding:"5px 6px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:10,outline:"none"}} /></div><div style={{flex:1}}><div style={{fontSize:8,fontWeight:600,color:"#aaa",marginBottom:3}}>목표시간 (분)</div><input type="number" value={targetMin} onChange={(e)=>setTargetMin(e.target.value)} placeholder="선택" style={{width:"100%",padding:"5px 6px",border:"1.5px solid #e8e8e8",borderRadius:8,fontSize:10,outline:"none"}} /></div></div>
        <div style={{marginBottom:8}}><div style={{fontSize:8,fontWeight:600,color:"#aaa",marginBottom:3}}>색상</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{COLORS.map((c)=>(<div key={c} onClick={()=>setColor(c)} style={{width:20,height:20,borderRadius:5,background:c,cursor:"pointer",border:color===c?"2px solid #222":"2px solid transparent",outline:color===c?"1.5px solid #fff":"none"}} />))}</div></div>
        <div style={{display:"flex",gap:6}}><button onClick={saveTodo} style={{flex:1,padding:8,background:"#222",color:"#fff",border:"none",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>{editId?"저장":"추가"}</button><button onClick={cancelForm} style={{padding:"8px 12px",background:"#f0f0f0",color:"#888",border:"none",borderRadius:8,fontSize:11,cursor:"pointer"}}>취소</button></div>
      </div>)}
 
      {filtered.length===0&&<div style={{textAlign:"center",padding:"36px 0",color:"#ddd",fontSize:11}}>항목이 없습니다</div>}
 
      {filtered.map((t)=>(<div key={t.id} style={{display:"flex",alignItems:"stretch",marginBottom:5,background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.02)",opacity:t.done?0.4:1,transition:"opacity 0.2s"}}>
        <div style={{width:3,background:t.color,flexShrink:0}} />
        <div onClick={()=>toggleTodo(t.id)} style={{display:"flex",alignItems:"center",padding:"0 0 0 10px",cursor:"pointer",flexShrink:0}}><div style={{width:16,height:16,borderRadius:4,border:"1.5px solid "+(t.done?t.color:"#ddd"),background:t.done?t.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>{t.done&&<span style={{color:"#fff",fontSize:9,fontWeight:700}}>✓</span>}</div></div>
        <div onClick={()=>openEdit(t)} style={{flex:1,padding:"9px 8px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:11,fontWeight:500,color:t.done?"#ccc":"#333",textDecoration:t.done?"line-through":"none",lineHeight:1.4}}>{t.title}</div><div style={{fontSize:8,color:"#ccc",marginTop:1}}>{fmtDate(t.date)}{t.tMin?"  ·  목표 "+t.tMin+"분":""}</div></div></div>
        <button onClick={(e)=>{e.stopPropagation();removeTodo(t.id);}} style={{background:"none",border:"none",cursor:"pointer",padding:"0 8px",fontSize:13,color:"#ddd",flexShrink:0}}>×</button>
      </div>))}
 
      {!showAdd&&(<div style={{position:"fixed",bottom:66,right:16,zIndex:50}}><button onClick={openAdd} style={{width:42,height:42,borderRadius:12,background:"#222",color:"#fff",border:"none",fontSize:20,cursor:"pointer",boxShadow:"0 4px 14px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button></div>)}
    </div>);
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<AuthWrapper />);
 
/* ════════════ OVERVIEW ════════════ */
function OverviewTab({timetable,notes,customBlocks,weekKey,setWeekKey,isCurrentWeek,todos,setTodos}) {
  const todayStr = getToday();
  const weekDates = getWeekDates(weekKey);
  const toggleTodo = (id) => setTodos((p) => p.map((t) => t.id === id ? {...t, done: !t.done} : t));
 
  const getBlocks = (dayIdx) => {
    const isWe = dayIdx >= 5;
    const result = [];
    if (!isWe) {
      const classes = timetable[dayIdx] || [];
      for (let i = 0; i < 8; i++) {
        const period = PERIODS[i];
        if (!period) continue;
        const cls = classes[i];
        if (cls) result.push({type:"class",start:period.start,end:period.end,period:period.p,name:cls[0],teacher:cls[1],subj:cls[3],customColor:cls[4]||""});
      }
    }
    const ub = (customBlocks[dayIdx]||[]).sort((a,b)=>toMin(a.start)-toMin(b.start));
    ub.forEach(b => result.push({type:"custom",start:b.start,end:b.end,name:b.title,color:b.color||"#888"}));
    return result;
  };
 
  const activeTodos = todos.filter(t=>!t.done).sort((a,b)=>{
    if(a.color!==b.color)return(a.color||"").localeCompare(b.color||"");
    return(a.title||"").localeCompare(b.title||"","ko");
  });
  const doneTodos = todos.filter(t=>t.done);
 
  return (
    <div style={{padding:"16px 12px"}}>
      {/* Week nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,background:"#222",color:"#fff",borderRadius:12,padding:"12px 16px"}}>
        <button onClick={()=>setWeekKey(shiftWeek(weekKey,-1))} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700}}>전체 보기</div>
          <div style={{fontSize:11,fontFamily:"monospace",opacity:0.6,marginTop:2}}>{getWeekLabel(weekKey)}</div>
          {!isCurrentWeek&&<button onClick={()=>setWeekKey(getCurrentWeekKey())} style={{background:"rgba(255,255,255,0.12)",border:"none",color:"#fff",padding:"2px 8px",borderRadius:6,fontSize:8,cursor:"pointer",marginTop:3,opacity:0.7}}>이번 주로</button>}
        </div>
        <button onClick={()=>setWeekKey(shiftWeek(weekKey,1))} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",width:28,height:28,borderRadius:8,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>
 
      {/* Week grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:16}}>
        {DAY_NAMES.map((d,i) => {
          const wd = weekDates[i];
          const isToday = wd && wd.full === todayStr;
          const blocks = getBlocks(i);
          const dayTodos = wd ? todos.filter(t => t.date === wd.full) : [];
          const dayActiveTodos = dayTodos.filter(t => !t.done).sort((a,b) => (a.title||"").localeCompare(b.title||"","ko"));
          const dayDoneTodos = dayTodos.filter(t => t.done);
 
          return (
            <div key={i} style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 4px rgba(0,0,0,0.03)",overflow:"hidden",border:isToday?"2px solid #222":"2px solid transparent"}}>
              {/* Day header */}
              <div style={{padding:"8px 8px 6px",borderBottom:"1px solid #f0f0ee",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,fontWeight:700,color:i>=5?"#c0a0a0":"#222"}}>{d}</span>
                <span style={{fontSize:9,fontFamily:"monospace",color:isToday?"#fff":"#bbb",background:isToday?"#222":"transparent",borderRadius:6,padding:isToday?"1px 5px":"0",fontWeight:isToday?700:400}}>{wd?wd.day:""}</span>
              </div>
 
              {/* Blocks */}
              <div style={{padding:"4px 6px 4px",display:"flex",flexDirection:"column",gap:3,minHeight:60}}>
                {blocks.length===0 && dayTodos.length===0 && <div style={{fontSize:8,color:"#ddd",textAlign:"center",padding:"20px 0"}}>일정 없음</div>}
                {blocks.map((b,bi) => {
                  const sc = b.type==="class" ? (SC[b.subj]||SC.etc) : null;
                  const color = b.type==="class" ? (b.customColor||sc.fg) : b.color;
                  const noteKey = b.type==="class" ? i+"-"+b.period : "";
                  const note = noteKey ? (notes[noteKey]||"") : "";
                  return (
                    <div key={bi} style={{borderLeft:"3px solid "+color,borderRadius:4,padding:"4px 6px",background:"#fafaf8"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:9,fontWeight:700,color}}>{b.name}</span>
                        <span style={{fontSize:7,color:"#ccc",fontFamily:"monospace"}}>{b.start}</span>
                      </div>
                      {b.teacher && <div style={{fontSize:7,color:"#bbb"}}>{b.teacher}</div>}
                      {note && <div style={{fontSize:7,color:"#999",marginTop:1,lineHeight:1.3}}>{note}</div>}
                    </div>
                  );
                })}
              </div>
 
              {/* Per-day todos */}
              {dayTodos.length > 0 && (
                <div style={{padding:"4px 6px 8px",borderTop:"1px dashed #eee"}}>
                  <div style={{fontSize:7,fontWeight:700,color:"#ccc",marginBottom:3,letterSpacing:0.5}}>TO DO</div>
                  {dayActiveTodos.map(t => (
                    <div key={t.id} onClick={()=>toggleTodo(t.id)} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 0",cursor:"pointer"}}>
                      <div style={{width:10,height:10,borderRadius:2,border:"1px solid #ddd",flexShrink:0}} />
                      <div style={{width:2,height:10,borderRadius:1,background:t.color,flexShrink:0}} />
                      <span style={{fontSize:8,color:"#444",lineHeight:1.3,flex:1,minWidth:0}}>{t.title}</span>
                    </div>
                  ))}
                  {dayDoneTodos.map(t => (
                    <div key={t.id} onClick={()=>toggleTodo(t.id)} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 0",cursor:"pointer",opacity:0.3}}>
                      <div style={{width:10,height:10,borderRadius:2,background:t.color,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:6,fontWeight:700}}>✓</span></div>
                      <div style={{width:2,height:10,borderRadius:1,background:t.color,flexShrink:0}} />
                      <span style={{fontSize:8,color:"#bbb",textDecoration:"line-through",lineHeight:1.3}}>{t.title}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
 
      {/* Todo section */}
      <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.03)",padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:14,fontWeight:700,fontFamily:"monospace",letterSpacing:0.5}}>TO DO LIST</div>
          <div style={{fontSize:9,color:"#bbb"}}>{activeTodos.length}개 남음</div>
        </div>
 
        {activeTodos.length===0 && <div style={{textAlign:"center",padding:"16px 0",color:"#ddd",fontSize:10}}>항목이 없습니다</div>}
 
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:4}}>
          {activeTodos.map(t => (
            <div key={t.id} onClick={()=>toggleTodo(t.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,cursor:"pointer",background:"#fafaf8",transition:"opacity 0.2s"}}>
              <div style={{width:3,height:20,borderRadius:2,background:t.color,flexShrink:0}} />
              <div style={{width:14,height:14,borderRadius:3,border:"1.5px solid #ddd",background:"transparent",flexShrink:0}} />
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,fontWeight:500,color:"#333",lineHeight:1.3}}>{t.title}</div>
                <div style={{fontSize:7,color:"#ccc"}}>{fmtDate(t.date)}{t.tMin?"  ·  "+t.tMin+"분":""}</div>
              </div>
            </div>
          ))}
        </div>
 
        {doneTodos.length>0 && (
          <div style={{marginTop:10,borderTop:"1px solid #f0f0ee",paddingTop:8}}>
            <div style={{fontSize:8,fontWeight:600,color:"#ccc",marginBottom:4}}>완료 ({doneTodos.length})</div>
            {doneTodos.slice(0,5).map(t => (
              <div key={t.id} onClick={()=>toggleTodo(t.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",borderRadius:6,cursor:"pointer",opacity:0.35}}>
                <div style={{width:3,height:16,borderRadius:2,background:t.color,flexShrink:0}} />
                <div style={{width:14,height:14,borderRadius:3,border:"1.5px solid "+t.color,background:t.color,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:8,fontWeight:700}}>✓</span></div>
                <span style={{fontSize:9,color:"#bbb",textDecoration:"line-through"}}>{t.title}</span>
              </div>
            ))}
            {doneTodos.length>5 && <div style={{fontSize:8,color:"#ccc",paddingLeft:8,marginTop:2}}>+{doneTodos.length-5}개 더</div>}
          </div>
        )}
      </div>
    </div>
  );
}
</script>
</body>
</html>
